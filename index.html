<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ephemeris — Solar System N-body</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060a;
      }
      #app {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 10;
        font-family: ui-monospace, "Cascadia Code", "Noto Sans Mono", monospace;
        font-size: 12px;
        line-height: 1.55;
        color: #d6e2f0;
        background: rgba(10, 14, 22, 0.55);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(120, 150, 190, 0.25);
        border-radius: 10px;
        padding: 12px 14px;
        max-width: 320px;
        user-select: none;
      }
      .hud-title {
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 6px;
        color: #8fd0ff;
      }
      .hud-row {
        color: #9fb3c8;
      }
      .hud-orbit {
        margin: 8px 0;
        padding: 8px 0;
        border-top: 1px solid rgba(120, 150, 190, 0.2);
        border-bottom: 1px solid rgba(120, 150, 190, 0.2);
      }
      .hud-dim {
        color: #6b7c91;
      }
      .hud-help {
        margin-top: 6px;
        color: #6b7c91;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
